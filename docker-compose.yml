services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sprint_tracker
      POSTGRES_USER: sprint
      POSTGRES_PASSWORD: sprint
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprint"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "3888:3001"
    environment:
      DATABASE_URL: postgres://sprint:sprint@db:5432/sprint_tracker
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
